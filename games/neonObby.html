<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Ascent - MEGA SIDEWAYS OBBY</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 15px 25px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 100;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #zone-counter {
            color: #ffaa00;
            font-size: 32px;
            margin-left: 10px;
        }
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 15px 30px;
            border-radius: 60px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 100;
            display: flex;
            gap: 40px;
            font-size: 18px;
            letter-spacing: 1px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .key {
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.3);
            font-weight: bold;
            color: #ffaa00;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            z-index: 200;
            display: none;
            background: rgba(0,0,0,0.8);
            padding: 30px 60px;
            border-radius: 20px;
            border: 2px solid #ffaa00;
            animation: glow 2s infinite;
        }
        @keyframes glow {
            0% { box-shadow: 0 0 30px #ffaa00; }
            50% { box-shadow: 0 0 60px #ffaa00; }
            100% { box-shadow: 0 0 30px #ffaa00; }
        }
        #death-message {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4444;
            font-size: 64px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 30px rgba(255,0,0,0.8);
            z-index: 200;
            display: none;
            animation: deathGlow 1s ease-out;
        }
        @keyframes deathGlow {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(2); }
        }
        #timer {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 15px 25px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            font-size: 24px;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 100;
        }
        #progress-bar {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 30px;
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            border: 2px solid rgba(255,170,0,0.5);
            overflow: hidden;
            z-index: 100;
        }
        #progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ffaa00, #ffdd44);
            border-radius: 15px;
            transition: width 0.3s;
        }
        #lives {
            position: absolute;
            top: 20px;
            left: 200px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 15px 25px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            font-size: 24px;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 100;
        }
        #death-counter {
            color: #ff4444;
            font-size: 32px;
            margin-left: 10px;
        }
        #distance {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 24px;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #debug {
            position: absolute;
            bottom: 150px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            z-index: 1000;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="info">
        🏆 ZONE <span id="zone-counter">1</span> / 50
    </div>
    <div id="lives">
        💀 DEATHS <span id="death-counter">0</span>
    </div>
    <div id="distance">
        📍 <span id="distance-counter">0</span>m / 500m
    </div>
    <div id="timer">
        ⏱️ <span id="time-display">0:00</span>
    </div>
    <div id="progress-bar">
        <div id="progress-fill"></div>
    </div>
    <div id="controls">
        <span><span class="key">WASD</span> MOVE</span>
        <span><span class="key">SPACE</span> JUMP</span>
        <span><span class="key">R</span> RESET</span>
        <span><span class="key">SHIFT</span> SPRINT</span>
    </div>
    <div id="message">
        🎉 ZONE COMPLETE! 🎉
    </div>
    <div id="death-message">
        💀 YOU DIED 💀
    </div>
    <div id="debug">
        Zone: <span id="debug-zone">1</span><br>
        X Position: <span id="debug-x">0</span><br>
        Grounded: <span id="grounded-status">false</span><br>
        Speed: <span id="debug-speed">0</span><br>
        Status: <span id="debug-status">ALIVE</span>
    </div>

    <!-- Import Three.js and related libraries -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // --- SETUP SCENE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x141c2c); // Dark blue night sky
        scene.fog = new THREE.Fog(0x141c2c, 100, 500);

        // --- CAMERA ---
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 5, 15);
        
        // --- RENDERER ---
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING ---
        // Ambient light
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        // Main directional light
        const sunLight = new THREE.DirectionalLight(0xfff5d1, 1.2);
        sunLight.position.set(50, 50, 50);
        sunLight.castShadow = true;
        sunLight.receiveShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        const d = 200;
        sunLight.shadow.camera.left = -d;
        sunLight.shadow.camera.right = d;
        sunLight.shadow.camera.top = d;
        sunLight.shadow.camera.bottom = -d;
        sunLight.shadow.camera.near = 1;
        sunLight.shadow.camera.far = 300;
        scene.add(sunLight);

        // Fill lights
        const fillLight1 = new THREE.PointLight(0x4466ff, 0.5);
        fillLight1.position.set(-50, 20, 50);
        scene.add(fillLight1);
        
        const fillLight2 = new THREE.PointLight(0xffaa44, 0.4);
        fillLight2.position.set(50, 20, -50);
        scene.add(fillLight2);

        // Red lights for danger areas
        const dangerLight1 = new THREE.PointLight(0xff0000, 1);
        dangerLight1.position.set(250, 10, 0);
        scene.add(dangerLight1);
        
        const dangerLight2 = new THREE.PointLight(0xff0000, 1);
        dangerLight2.position.set(400, 10, 0);
        scene.add(dangerLight2);

        // --- BACKGROUND STARS ---
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 2000;
        const starsPositions = new Float32Array(starsCount * 3);
        for (let i = 0; i < starsCount * 3; i += 3) {
            starsPositions[i] = (Math.random() - 0.5) * 1000;
            starsPositions[i+1] = (Math.random() - 0.5) * 1000;
            starsPositions[i+2] = (Math.random() - 0.5) * 1000 - 200;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({color: 0xffffff, size: 0.5});
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // --- COLLISION OBJECTS ARRAYS ---
        const safeCollisionObjects = []; // Platforms you can stand on
        const deathObjects = []; // Things that kill you

        // --- GIANT BASE PLATFORM (The path) ---
        const pathLength = 600;
        const pathWidth = 30;
        
        // Main path
        const pathMat = new THREE.MeshStandardMaterial({ color: 0x2a3a4a, roughness: 0.6, metalness: 0.2 });
        const path = new THREE.Mesh(new THREE.BoxGeometry(pathLength, 2, pathWidth), pathMat);
        path.position.set(pathLength/2 - 50, -1, 0); // Start at x=0, go to x=500
        path.receiveShadow = true;
        path.castShadow = true;
        path.userData = { type: 'path', solid: true, safe: true };
        scene.add(path);
        safeCollisionObjects.push(path);

        // Path edges with glowing lights
        for (let i = 0; i < 20; i++) {
            const x = i * 30;
            const edgeLight = new THREE.Mesh(
                new THREE.BoxGeometry(2, 1, 2),
                new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x442200 })
            );
            edgeLight.position.set(x, 1, -pathWidth/2 - 1);
            edgeLight.userData = { safe: true };
            scene.add(edgeLight);
            
            const edgeLight2 = new THREE.Mesh(
                new THREE.BoxGeometry(2, 1, 2),
                new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x442200 })
            );
            edgeLight2.position.set(x, 1, pathWidth/2 + 1);
            edgeLight2.userData = { safe: true };
            scene.add(edgeLight2);
        }

        // Grid on path
        const gridHelper = new THREE.GridHelper(pathLength, 50, 0xffaa00, 0x336633);
        gridHelper.position.set(pathLength/2 - 50, 0, 0);
        gridHelper.rotation.x = Math.PI / 2;
        scene.add(gridHelper);

        // --- PLAYER (Slightly bigger for the scale) ---
        const playerGroup = new THREE.Group();
        
        // Body
        const bodyGeo = new THREE.BoxGeometry(2, 3, 2);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff5500, emissive: 0x331100 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.castShadow = true;
        body.receiveShadow = true;
        body.position.y = 1.5;
        playerGroup.add(body);
        
        // Head
        const headGeo = new THREE.SphereGeometry(1, 16, 16);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x221100 });
        const head = new THREE.Mesh(headGeo, headMat);
        head.castShadow = true;
        head.receiveShadow = true;
        head.position.y = 3.5;
        playerGroup.add(head);
        
        // Eyes
        const eyeGeo = new THREE.SphereGeometry(0.3, 8, 8);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        
        const eye1 = new THREE.Mesh(eyeGeo, eyeMat);
        eye1.position.set(-0.5, 3.8, 1);
        playerGroup.add(eye1);
        
        const eye2 = new THREE.Mesh(eyeGeo, eyeMat);
        eye2.position.set(0.5, 3.8, 1);
        playerGroup.add(eye2);
        
        const pupil1 = new THREE.Mesh(new THREE.SphereGeometry(0.15, 6, 6), pupilMat);
        pupil1.position.set(-0.5, 3.8, 1.2);
        playerGroup.add(pupil1);
        
        const pupil2 = new THREE.Mesh(new THREE.SphereGeometry(0.15, 6, 6), pupilMat);
        pupil2.position.set(0.5, 3.8, 1.2);
        playerGroup.add(pupil2);
        
        // Arms
        const armGeo = new THREE.BoxGeometry(0.8, 2, 0.8);
        const armMat = new THREE.MeshStandardMaterial({ color: 0xff5500 });
        
        const leftArm = new THREE.Mesh(armGeo, armMat);
        leftArm.position.set(-1.5, 2.5, 0);
        leftArm.castShadow = true;
        playerGroup.add(leftArm);
        
        const rightArm = new THREE.Mesh(armGeo, armMat);
        rightArm.position.set(1.5, 2.5, 0);
        rightArm.castShadow = true;
        playerGroup.add(rightArm);
        
        // Legs
        const legGeo = new THREE.BoxGeometry(0.8, 2, 0.8);
        const legMat = new THREE.MeshStandardMaterial({ color: 0xcc4400 });
        
        const leftLeg = new THREE.Mesh(legGeo, legMat);
        leftLeg.position.set(-0.6, 0, 0);
        leftLeg.castShadow = true;
        playerGroup.add(leftLeg);
        
        const rightLeg = new THREE.Mesh(legGeo, legMat);
        rightLeg.position.set(0.6, 0, 0);
        rightLeg.castShadow = true;
        playerGroup.add(rightLeg);
        
        playerGroup.position.set(5, 3, 0);
        playerGroup.castShadow = true;
        playerGroup.receiveShadow = true;
        scene.add(playerGroup);

        // Player collision variables
        const playerRadius = 1.2;
        const playerHeight = 4.0;
        let isGrounded = false;
        let currentZone = 1;
        const totalZones = 50;
        let deathCount = 0;
        let isDead = false;
        let deathFlash = 0;
        
        // --- MEGA SIDEWAYS OBSTACLE GENERATOR ---
        const obstacles = [];
        const checkpoints = [];
        const decorations = [];

        // Generate 500 meters of deadly obstacles
        function generateObstacleCourse() {
            for (let x = 20; x < 520; x += 10) {
                const zoneNumber = Math.floor(x / 10);
                const difficulty = Math.min(1, zoneNumber / 30);
                
                // Random obstacle type based on position
                const type = Math.floor(Math.random() * 7);
                
                // Create varied deadly obstacles
                switch(type) {
                    case 0: // Moving platforms (safe)
                        createMovingPlatform(x, 2, 3, 2 + difficulty * 4, true);
                        createMovingPlatform(x, -2, -3, 2 + difficulty * 4, true);
                        break;
                    case 1: // Jump pads (safe)
                        createJumpPad(x, 1, 0);
                        createJumpPad(x + 3, 1, 5);
                        break;
                    case 2: // Spinning death bars (DEADLY - RED)
                        createSpinningBar(x, 3, 0, true);
                        createSpinningBar(x + 5, 3, 8, true);
                        break;
                    case 3: // Gaps with floating platforms (platforms safe, gaps deadly)
                        createGapWithPlatforms(x, 4);
                        break;
                    case 4: // Wall jumps (walls safe)
                        createWallJumpSection(x);
                        break;
                    case 5: // DEADLY spinning saws (RED)
                        createSpinningSaw(x, 2, -5);
                        createSpinningSaw(x, 2, 5);
                        break;
                    case 6: // DEADLY laser beams (RED)
                        createLaserBeam(x, 2, 0);
                        break;
                }
                
                // Add decorations every 5 meters
                if (x % 20 === 0) {
                    createZoneMarker(x, zoneNumber);
                }
                
                // Add checkpoints every 50 meters
                if (x % 50 === 0 && x > 20) {
                    createCheckpoint(x, zoneNumber);
                }
            }
        }

        function createMovingPlatform(x, yOffset, zOffset, speed, isSafe) {
            const color = isSafe ? 0x44aaff : 0xff4444;
            const emissive = isSafe ? 0x113355 : 0x331111;
            const platformMat = new THREE.MeshStandardMaterial({ color: color, emissive: emissive });
            const platform = new THREE.Mesh(new THREE.BoxGeometry(3, 0.8, 4), platformMat);
            platform.castShadow = true;
            platform.receiveShadow = true;
            platform.position.set(x, yOffset + 1, zOffset);
            
            platform.userData = {
                type: 'moving',
                originalX: x,
                originalZ: zOffset,
                range: 4,
                speed: speed,
                direction: 1,
                time: Math.random() * 100,
                moveAxis: Math.random() > 0.5 ? 'x' : 'z',
                y: yOffset + 1.4,
                safe: isSafe,
                deadly: !isSafe
            };
            
            scene.add(platform);
            obstacles.push(platform);
            
            if (isSafe) {
                safeCollisionObjects.push(platform);
            } else {
                deathObjects.push(platform);
            }
            
            return platform;
        }

        function createSpinningBar(x, yOffset, zOffset, isDeadly) {
            const group = new THREE.Group();
            
            const barColor = isDeadly ? 0xff0000 : 0xff4444;
            const barMat = new THREE.MeshStandardMaterial({ color: barColor, emissive: isDeadly ? 0x550000 : 0x331111 });
            const bar = new THREE.Mesh(new THREE.BoxGeometry(8, 0.4, 0.4), barMat);
            bar.castShadow = true;
            bar.receiveShadow = true;
            
            const centerMat = new THREE.MeshStandardMaterial({ color: isDeadly ? 0xff0000 : 0xffaa00, emissive: isDeadly ? 0x550000 : 0x442200 });
            const center = new THREE.Mesh(new THREE.SphereGeometry(1, 16, 16), centerMat);
            center.castShadow = true;
            
            group.add(bar);
            group.add(center);
            group.position.set(x, yOffset + 1.5, zOffset);
            
            group.userData = {
                type: 'spinning',
                speed: 2,
                rotationAxis: 'y',
                deadly: isDeadly
            };
            
            scene.add(group);
            obstacles.push(group);
            
            if (isDeadly) {
                deathObjects.push(group);
            }
            
            return group;
        }

        function createSpinningSaw(x, yOffset, zOffset) {
            const group = new THREE.Group();
            
            // Saw blade
            const bladeMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x330000, metalness: 0.8 });
            const blade = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 0.2, 32), bladeMat);
            blade.castShadow = true;
            blade.receiveShadow = true;
            blade.rotation.z = Math.PI / 4;
            
            // Teeth
            const toothMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x330000 });
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const tooth = new THREE.Mesh(new THREE.ConeGeometry(0.5, 1, 8), toothMat);
                tooth.position.set(Math.cos(angle) * 2, 0, Math.sin(angle) * 2);
                tooth.rotation.x = Math.PI / 2;
                tooth.rotation.z = angle;
                group.add(tooth);
            }
            
            group.add(blade);
            group.position.set(x, yOffset + 1, zOffset);
            
            group.userData = {
                type: 'saw',
                speed: 5,
                deadly: true
            };
            
            scene.add(group);
            obstacles.push(group);
            deathObjects.push(group);
            
            return group;
        }

        function createLaserBeam(x, yOffset, zOffset) {
            const group = new THREE.Group();
            
            // Laser emitter
            const emitterMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const emitter = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 2), emitterMat);
            emitter.position.y = 0.5;
            
            // Laser beam (rotating)
            const beamMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x550000, transparent: true, opacity: 0.7 });
            const beam = new THREE.Mesh(new THREE.BoxGeometry(20, 0.2, 0.2), beamMat);
            beam.position.set(0, 1, 0);
            
            group.add(emitter);
            group.add(beam);
            group.position.set(x, yOffset + 1, zOffset);
            
            group.userData = {
                type: 'laser',
                speed: 2,
                rotationAngle: 0,
                deadly: true
            };
            
            scene.add(group);
            obstacles.push(group);
            deathObjects.push(group);
            
            return group;
        }

        function createJumpPad(x, yOffset, zOffset) {
            const padMat = new THREE.MeshStandardMaterial({ color: 0x44ff44, emissive: 0x224422 });
            const pad = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 0.4, 16), padMat);
            pad.castShadow = true;
            pad.receiveShadow = true;
            pad.position.set(x, yOffset + 0.2, zOffset);
            
            pad.userData = {
                type: 'jumppad',
                force: 20,
                y: yOffset + 0.4,
                safe: true
            };
            
            scene.add(pad);
            obstacles.push(pad);
            safeCollisionObjects.push(pad);
            return pad;
        }

        function createGapWithPlatforms(x, width) {
            // Create floating platforms over a gap (all safe)
            for (let i = -1; i <= 1; i++) {
                const platformMat = new THREE.MeshStandardMaterial({ color: 0xffaa44 });
                const platform = new THREE.Mesh(new THREE.BoxGeometry(2, 0.5, 3), platformMat);
                platform.castShadow = true;
                platform.receiveShadow = true;
                platform.position.set(x + i * 3, 2 + Math.abs(i) * 1.5, i * 2);
                platform.userData = { type: 'platform', y: platform.position.y + 0.25, safe: true };
                scene.add(platform);
                safeCollisionObjects.push(platform);
                decorations.push(platform);
            }
            
            // The gap itself is deadly (empty space)
            // Create warning lights
            const warningMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x330000 });
            for (let i = -1; i <= 1; i+=2) {
                const warning = new THREE.Mesh(new THREE.BoxGeometry(1, 0.2, 4), warningMat);
                warning.position.set(x, 0.5, i * 10);
                scene.add(warning);
            }
        }

        function createWallJumpSection(x) {
            // Create walls for wall jumping (safe)
            const wallMat = new THREE.MeshStandardMaterial({ color: 0xaa44ff, emissive: 0x221133 });
            
            const leftWall = new THREE.Mesh(new THREE.BoxGeometry(1, 8, 20), wallMat);
            leftWall.position.set(x, 4, -12);
            leftWall.castShadow = true;
            leftWall.receiveShadow = true;
            leftWall.userData = { type: 'wall', y: 8, safe: true };
            scene.add(leftWall);
            safeCollisionObjects.push(leftWall);
            
            const rightWall = new THREE.Mesh(new THREE.BoxGeometry(1, 8, 20), wallMat);
            rightWall.position.set(x, 4, 12);
            rightWall.castShadow = true;
            rightWall.receiveShadow = true;
            rightWall.userData = { type: 'wall', y: 8, safe: true };
            scene.add(rightWall);
            safeCollisionObjects.push(rightWall);
        }

        function createZoneMarker(x, zoneNumber) {
            const markerMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x442200 });
            const marker = new THREE.Mesh(new THREE.BoxGeometry(1, 5, 1), markerMat);
            marker.position.set(x, 2.5, -15);
            marker.userData = { type: 'marker', zone: zoneNumber, safe: true };
            scene.add(marker);
            decorations.push(marker);
        }

        function createCheckpoint(x, zoneNumber) {
            const checkpointMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x004400 });
            const checkpoint = new THREE.Mesh(new THREE.TorusGeometry(2, 0.3, 16, 32), checkpointMat);
            checkpoint.rotation.x = Math.PI / 2;
            checkpoint.position.set(x, 3, 0);
            checkpoint.userData = { type: 'checkpoint', zone: zoneNumber, x: x, safe: true };
            scene.add(checkpoint);
            checkpoints.push(checkpoint);
            
            // Add glow
            const glowMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00ff00, transparent: true, opacity: 0.3 });
            const glow = new THREE.Mesh(new THREE.SphereGeometry(3, 8, 8), glowMat);
            glow.position.set(x, 3, 0);
            glow.userData = { safe: true };
            scene.add(glow);
        }

        // Generate the course
        generateObstacleCourse();

        // Add floating orbs (collectibles) - 10x more!
        const orbs = [];
        for (let i = 0; i < 200; i++) {
            const orbMat = new THREE.MeshStandardMaterial({ 
                color: 0xffdd44, 
                emissive: 0x442200,
                transparent: true,
                opacity: 0.9
            });
            const orb = new THREE.Mesh(new THREE.SphereGeometry(0.6, 16, 16), orbMat);
            
            const x = 20 + Math.random() * 480;
            orb.position.set(
                x,
                3 + Math.random() * 5,
                (Math.random() - 0.5) * 20
            );
            
            orb.userData = { type: 'collectible', collected: false, x: x, safe: true };
            scene.add(orb);
            orbs.push(orb);
        }

        // Add giant arches for visual effect
        for (let i = 0; i < 10; i++) {
            const x = i * 50 + 25;
            const archGroup = new THREE.Group();
            
            const pillarMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8 });
            
            const leftPillar = new THREE.Mesh(new THREE.BoxGeometry(2, 15, 2), pillarMat);
            leftPillar.position.set(x, 7.5, -12);
            leftPillar.userData = { safe: true };
            archGroup.add(leftPillar);
            
            const rightPillar = new THREE.Mesh(new THREE.BoxGeometry(2, 15, 2), pillarMat);
            rightPillar.position.set(x, 7.5, 12);
            rightPillar.userData = { safe: true };
            archGroup.add(rightPillar);
            
            const topBeam = new THREE.Mesh(new THREE.BoxGeometry(30, 2, 2), pillarMat);
            topBeam.position.set(x, 15, 0);
            topBeam.userData = { safe: true };
            archGroup.add(topBeam);
            
            scene.add(archGroup);
        }

        // --- GAME STATE ---
        const velocity = new THREE.Vector3();
        const gravity = 1.2;
        const moveSpeed = 0.3;
        const sprintMultiplier = 2.0;
        const jumpForce = 18;
        let gameTime = 0;
        let lastTime = performance.now() / 1000;
        let gameComplete = false;
        
        // Input handling
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // Mouse lock for camera control
        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });

        // Camera control
        let cameraAngle = 0;
        let cameraPitch = 0.3;
        const cameraSensitivity = 0.002;

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement) {
                cameraAngle -= e.movementX * cameraSensitivity;
                cameraPitch -= e.movementY * cameraSensitivity;
                cameraPitch = Math.max(-0.5, Math.min(1, cameraPitch));
            }
        });

        // Update displays
        function updateDisplays() {
            document.getElementById('zone-counter').textContent = currentZone;
            document.getElementById('distance-counter').textContent = Math.floor(playerGroup.position.x);
            document.getElementById('progress-fill').style.width = (playerGroup.position.x / 500 * 100) + '%';
            document.getElementById('death-counter').textContent = deathCount;
            
            document.getElementById('debug-zone').textContent = currentZone;
            document.getElementById('debug-x').textContent = playerGroup.position.x.toFixed(1);
            document.getElementById('grounded-status').textContent = isGrounded;
            document.getElementById('debug-speed').textContent = Math.sqrt(velocity.x*velocity.x + velocity.z*velocity.z).toFixed(1);
            document.getElementById('debug-status').textContent = isDead ? 'DEAD' : 'ALIVE';
        }

        // Update timer
        function updateTimer() {
            const minutes = Math.floor(gameTime / 60);
            const seconds = Math.floor(gameTime % 60);
            document.getElementById('time-display').textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        // Death function
        function die() {
            if (isDead) return; // Prevent multiple deaths at once
            
            isDead = true;
            deathCount++;
            
            // Show death message
            const deathMsg = document.getElementById('death-message');
            deathMsg.style.display = 'block';
            setTimeout(() => {
                deathMsg.style.display = 'none';
            }, 1000);
            
            // Screen flash red
            deathFlash = 10;
            
            // Find the last checkpoint passed
            let lastCheckpointX = 5;
            let lastCheckpointZone = 1;
            
            // Sort checkpoints by x position
            const sortedCheckpoints = [...checkpoints].sort((a, b) => a.userData.x - b.userData.x);
            
            for (const cp of sortedCheckpoints) {
                if (cp.userData.x <= playerGroup.position.x) {
                    lastCheckpointX = cp.userData.x;
                    lastCheckpointZone = cp.userData.zone;
                }
            }
            
            // Reset player to checkpoint
            playerGroup.position.set(lastCheckpointX, 3, 0);
            velocity.set(0, 0, 0);
            
            // Update zone
            currentZone = lastCheckpointZone;
            
            // Brief invincibility frames (visual only)
            setTimeout(() => {
                isDead = false;
            }, 500);
        }

        // Reset function
        function resetToLastCheckpoint() {
            // Find the last checkpoint passed
            let lastCheckpointX = 5;
            const sortedCheckpoints = [...checkpoints].sort((a, b) => a.userData.x - b.userData.x);
            
            for (const cp of sortedCheckpoints) {
                if (cp.userData.x <= playerGroup.position.x) {
                    lastCheckpointX = cp.userData.x;
                }
            }
            playerGroup.position.set(lastCheckpointX, 3, 0);
            velocity.set(0, 0, 0);
        }

        // Collision detection
        function checkCollisionsAndMove() {
            // Apply movement
            playerGroup.position.x += velocity.x;
            playerGroup.position.y += velocity.y * 0.2;
            playerGroup.position.z += velocity.z;
            
            // Keep player within path width
            playerGroup.position.z = Math.max(-12, Math.min(12, playerGroup.position.z));
            
            // Don't let player go backwards too much
            if (playerGroup.position.x < 5) playerGroup.position.x = 5;
            
            // Check collisions with safe objects (platforms)
            isGrounded = false;
            
            const playerMinY = playerGroup.position.y - playerHeight/2;
            const playerMaxY = playerGroup.position.y + playerHeight/2;
            
            // Check safe objects for landing
            for (const obj of safeCollisionObjects) {
                if (!obj.geometry) continue;
                
                const objBox = new THREE.Box3().setFromObject(obj);
                
                // Simple distance check
                const dx = Math.abs(playerGroup.position.x - obj.position.x);
                const dz = Math.abs(playerGroup.position.z - obj.position.z);
                
                if (dx < 3 && dz < 3) {
                    const playerBottom = playerGroup.position.y - playerHeight/2;
                    const objTop = objBox.max.y;
                    
                    // Landing on object
                    if (velocity.y <= 0 && 
                        playerBottom <= objTop + 0.5 && 
                        playerBottom >= objTop - 0.3 &&
                        playerGroup.position.y > objTop) {
                        
                        playerGroup.position.y = objTop + playerHeight/2 + 0.1;
                        velocity.y = 0;
                        isGrounded = true;
                        
                        // Jump pad effect
                        if (obj.userData.type === 'jumppad') {
                            velocity.y = obj.userData.force;
                            isGrounded = false;
                        }
                    }
                }
            }
            
            // Ground collision (path)
            if (playerGroup.position.y - playerHeight/2 < 0) {
                playerGroup.position.y = playerHeight/2;
                velocity.y = 0;
                isGrounded = true;
            }
            
            // Check death objects (RED = deadly)
            if (!isDead) {
                for (const obj of deathObjects) {
                    if (!obj.geometry && !obj.children) continue;
                    
                    let objBox;
                    try {
                        objBox = new THREE.Box3().setFromObject(obj);
                    } catch (e) {
                        continue;
                    }
                    
                    const playerBox = new THREE.Box3();
                    const playerSize = new THREE.Vector3(2, 4, 2);
                    playerBox.setFromCenterAndSize(playerGroup.position, playerSize);
                    
                    if (playerBox.intersectsBox(objBox)) {
                        die();
                        break;
                    }
                }
            }
            
            // Fall off detection (deadly)
            if (playerGroup.position.y < -5 && !isDead) {
                die();
            }
            
            // Update zone based on x position
            if (!isDead) {
                const newZone = Math.floor(playerGroup.position.x / 10) + 1;
                if (newZone > currentZone && newZone <= totalZones) {
                    currentZone = newZone;
                    
                    if (currentZone === totalZones) {
                        showVictory();
                    }
                }
            }
            
            // Check collectibles
            for (let i = orbs.length - 1; i >= 0; i--) {
                const orb = orbs[i];
                if (!orb.userData.collected) {
                    const dist = playerGroup.position.distanceTo(orb.position);
                    if (dist < 3) {
                        orb.userData.collected = true;
                        orb.visible = false;
                        orbs.splice(i, 1);
                    }
                }
            }
        }

        function showVictory() {
            document.getElementById('message').style.display = 'block';
            document.getElementById('message').innerHTML = '🎉 VICTORY! 500m COMPLETE! 🎉';
            gameComplete = true;
        }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now() / 1000;
            const deltaTime = Math.min(now - lastTime, 0.1);
            lastTime = now;
            
            if (!gameComplete) {
                gameTime += deltaTime;
                updateTimer();
            }

            // Player movement
            if (!gameComplete && !isDead) {
                // Camera-relative movement
                const forward = new THREE.Vector3(1, 0, 0); // Always forward along X axis
                const right = new THREE.Vector3(0, 0, 1); // Z axis for strafing
                
                // Reset horizontal velocity
                velocity.x = 0;
                velocity.z = 0;
                
                const currentSpeed = keys['ShiftLeft'] ? moveSpeed * sprintMultiplier : moveSpeed;
                
                if (keys['KeyW']) {
                    velocity.x += currentSpeed;
                }
                if (keys['KeyS']) {
                    velocity.x -= currentSpeed * 0.5; // Slower backward movement
                }
                if (keys['KeyA']) {
                    velocity.z -= currentSpeed * 0.8;
                }
                if (keys['KeyD']) {
                    velocity.z += currentSpeed * 0.8;
                }
                
                // Jump
                if (keys['Space'] && isGrounded) {
                    velocity.y = jumpForce;
                    isGrounded = false;
                }
                
                // Reset
                if (keys['KeyR']) {
                    resetToLastCheckpoint();
                }
                
                // Apply gravity
                if (!isGrounded) {
                    velocity.y -= gravity;
                } else {
                    velocity.y = 0;
                }
                
                // Check collisions and update position
                checkCollisionsAndMove();
                
                // Update displays
                updateDisplays();
            }

            // Animate obstacles
            obstacles.forEach(obs => {
                if (obs.userData.type === 'moving') {
                    obs.userData.time += 0.02;
                    if (obs.userData.moveAxis === 'x') {
                        obs.position.x = obs.userData.originalX + Math.sin(obs.userData.time * obs.userData.speed) * obs.userData.range;
                    } else {
                        obs.position.z = obs.userData.originalZ + Math.sin(obs.userData.time * obs.userData.speed) * obs.userData.range;
                    }
                } else if (obs.userData.type === 'spinning') {
                    obs.rotation.y += 0.03 * obs.userData.speed;
                } else if (obs.userData.type === 'saw') {
                    obs.rotation.y += 0.1 * obs.userData.speed;
                } else if (obs.userData.type === 'laser') {
                    obs.userData.rotationAngle += 0.02 * obs.userData.speed;
                    obs.rotation.y = Math.sin(obs.userData.rotationAngle) * 0.5;
                }
            });

            // Animate orbs
            orbs.forEach(orb => {
                orb.position.y += Math.sin(now * 2) * 0.01;
                orb.rotation.y += 0.02;
            });

            // Animate checkpoints
            checkpoints.forEach(cp => {
                cp.rotation.y += 0.02;
            });

            // Move stars slowly
            stars.rotation.y += 0.0001;

            // Death flash effect
            if (deathFlash > 0) {
                scene.background.setHSL(0, 1, 0.1); // Red flash
                deathFlash--;
            } else {
                scene.background.setHex(0x141c2c); // Back to normal
            }

            // Update camera (follow from behind)
            const cameraOffset = new THREE.Vector3(
                -15,
                8 + cameraPitch * 5,
                5 * Math.sin(cameraAngle)
            );
            
            camera.position.copy(playerGroup.position.clone().add(cameraOffset));
            camera.lookAt(playerGroup.position.clone().add(new THREE.Vector3(2, 1, 0)));

            renderer.render(scene, camera);
        }

        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize
        resetToLastCheckpoint();
        updateDisplays();

        console.log('MEGA SIDEWAYS OBBY loaded - RED PARTS KILL YOU!');
    </script>
</body>
