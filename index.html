<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <link rel="icon" href="logo.png" type="image/png">
  <title>Bricknova � games</title>
  <!-- ANTI-CACHING META TAGS -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }
    body {
      background: #ff8c42;
      background-image: 
        linear-gradient(#1e3a5f 1.8px, transparent 1.8px),
        linear-gradient(90deg, #1e3a5f 1.8px, transparent 1.8px);
      background-size: 30px 30px;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      padding: 1rem;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: #ffa559;
      border: 4px solid #1e3a5f;
      padding: 1.5rem;
      box-shadow: 12px 12px 0 #2c4c6b;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      border-bottom: 3px solid #1e3a5f;
      padding-bottom: 1rem;
      flex-wrap: wrap;
    }
    .logo {
      width: 60px;
      height: 60px;
      background-image: url('logo.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      background-color: #ffa559;
      border: 3px solid #1e3a5f;
      flex-shrink: 0;
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 900;
      color: #0b2a4a;
      text-transform: uppercase;
      text-shadow: 3px 3px 0 #ffd966;
      word-break: break-word;
    }
    
    /* BANNER STYLES */
    .banner-container {
      margin-bottom: 1.5rem;
    }
    .site-banner {
      background: #ffd966;
      border: 4px solid #1e3a5f;
      padding: 1rem 1.5rem;
      box-shadow: 6px 6px 0 #2c4c6b;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      font-weight: 700;
      transition: background-color 0.2s;
    }
    .banner-content {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      flex: 1;
    }
    .banner-icon {
      font-size: 1.5rem;
      background: #1e3a5f;
      color: white;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #ffb347;
      flex-shrink: 0;
    }
    .banner-text {
      font-size: 1.1rem;
      color: #1e3a5f;
      word-break: break-word;
      flex: 1;
    }
    .banner-link {
      background: #1e3a5f;
      color: #ffd966;
      border: 3px solid #ffb347;
      font-weight: 900;
      font-size: 0.9rem;
      padding: 0.5rem 1rem;
      text-decoration: none;
      text-transform: uppercase;
      box-shadow: 3px 3px 0 #2c4c6b;
      white-space: nowrap;
      transition: 0.1s;
    }
    .banner-link:hover {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 #1e3a5f;
    }
    .banner-link:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 #2c4c6b;
    }
    
    .discord-panel {
      background: #ffd1a4;
      border: 4px solid #1e3a5f;
      padding: 1.2rem;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      box-shadow: 6px 6px 0 #2c4c6b;
    }
    .discord-panel p {
      font-size: 1.1rem;
      font-weight: 700;
      color: #0b2a4a;
      word-break: break-word;
    }
    .discord-button {
      background: #5865F2;
      border: 3px solid #1e3a5f;
      color: white;
      font-weight: 900;
      font-size: 1.1rem;
      padding: 0.6rem 1.2rem;
      text-decoration: none;
      text-transform: uppercase;
      box-shadow: 4px 4px 0 #1e3a5f;
      white-space: nowrap;
    }

    /* FILTER SECTION */
    .filter-section {
      background: #ffd1a4;
      border: 4px solid #1e3a5f;
      padding: 1rem;
      margin-bottom: 2rem;
      box-shadow: 6px 6px 0 #2c4c6b;
    }
    .filter-title {
      font-size: 1.2rem;
      font-weight: 900;
      color: #0b2a4a;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
    }
    .filter-buttons {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: #1e3a5f;
      color: #ffd966;
      font-weight: 900;
      font-size: 1rem;
      padding: 0.5rem 1.2rem;
      border: 3px solid #ffb347;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 3px 3px 0 #2c4c6b;
      transition: 0.1s;
    }
    .filter-btn:hover {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 #1e3a5f;
    }
    .filter-btn.active {
      background: #ffd966;
      color: #1e3a5f;
      border-color: #1e3a5f;
    }
    .filter-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 #2c4c6b;
    }

    /* FEATURED SECTION STYLES */
    .featured-section {
      margin-bottom: 2rem;
    }
    .featured-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .featured-header h2 {
      font-size: 1.8rem;
      color: #0b2a4a;
      text-transform: uppercase;
      background: #ffd966;
      padding: 0.3rem 1.2rem;
      border: 3px solid #1e3a5f;
      display: inline-block;
    }
    .featured-star {
      font-size: 2rem;
      animation: glow 1.5s ease-in-out infinite;
    }
    @keyframes glow {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }
    .featured-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1.2rem;
      margin-bottom: 1.5rem;
    }
    .featured-badge {
      position: absolute;
      top: 5px;
      left: 5px;
      background: #ffd700;
      color: #1e3a5f;
      font-size: 0.8rem;
      font-weight: 900;
      padding: 0.3rem 0.6rem;
      border: 2px solid #1e3a5f;
      text-transform: uppercase;
      z-index: 3;
      box-shadow: 2px 2px 0 #2c4c6b;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .featured-badge span {
      font-size: 1rem;
    }
    .featured-divider {
      height: 4px;
      background: linear-gradient(90deg, #ffd700, #1e3a5f, #ffd700);
      margin: 2rem 0 1.5rem 0;
      border: none;
    }

    /* LOCK BADGE STYLES */
    .lock-badge {
      position: absolute;
      top: 5px;
      left: 5px;
      background: #8b0000;
      color: #ffd966;
      font-size: 0.8rem;
      font-weight: 900;
      padding: 0.3rem 0.6rem;
      border: 2px solid #1e3a5f;
      text-transform: uppercase;
      z-index: 3;
      box-shadow: 2px 2px 0 #2c4c6b;
      display: flex;
      align-items: center;
      gap: 4px;
      animation: lockPulse 2s infinite;
    }

    @keyframes lockPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }

    .lock-badge span {
      font-size: 1rem;
    }

    /* Locked card styling */
    .locked-card {
      opacity: 0.8;
      cursor: not-allowed;
      position: relative;
      pointer-events: none;
      background: #ffb347;
      border: 3px solid #1e3a5f;
      box-shadow: 5px 5px 0 #2c4c6b;
      display: flex;
      flex-direction: column;
    }

    .locked-card::after {
      content: "%uD83D%uDD12 LOCKED";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-15deg);
      background: #8b0000;
      color: #ffd966;
      font-size: 1.5rem;
      font-weight: 900;
      padding: 0.5rem 1rem;
      border: 4px solid #1e3a5f;
      z-index: 10;
      white-space: nowrap;
      box-shadow: 4px 4px 0 #2c4c6b;
      opacity: 0.9;
      pointer-events: none;
      text-transform: uppercase;
    }

    .games-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .games-header h2 {
      font-size: 1.8rem;
      color: #0b2a4a;
      text-transform: uppercase;
      background: #ffd966;
      padding: 0.3rem 1.2rem;
      border: 3px solid #1e3a5f;
    }
    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .game-card {
      background: #ffb347;
      border: 3px solid #1e3a5f;
      box-shadow: 5px 5px 0 #2c4c6b;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: transform 0.1s;
      position: relative;
    }
    .game-card:hover {
      transform: translate(-2px, -2px);
      box-shadow: 8px 8px 0 #1e3a5f;
    }
    .game-card:active {
      transform: translate(2px, 2px);
      box-shadow: 3px 3px 0 #2c4c6b;
    }
    .game-thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #ffe5cc;
      border-bottom: 3px solid #1e3a5f;
      position: relative;
      overflow: hidden;
    }
    .game-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .thumb-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      background: #ffe5cc;
    }
    /* Tag badges on game cards */
    .game-tags {
      position: absolute;
      top: 5px;
      right: 5px;
      display: flex;
      gap: 3px;
      z-index: 2;
    }
    .tag-badge {
      background: #1e3a5f;
      color: white;
      font-size: 0.7rem;
      font-weight: 900;
      padding: 0.2rem 0.4rem;
      border: 2px solid #ffd966;
      text-transform: uppercase;
      border-radius: 0;
    }
    .tag-badge.mobile {
      background: #5865F2;
    }
    .tag-badge.pc {
      background: #2c4c6b;
    }
    .tag-badge.both {
      background: #ff8c42;
      color: #0b2a4a;
      border-color: #1e3a5f;
    }
    .game-info {
      padding: 0.6rem 0.8rem;
    }
    .game-title {
      font-weight: 900;
      font-size: 1rem;
      color: #0b2a4a;
      text-transform: uppercase;
      text-align: center;
      word-break: break-word;
    }
    .footer {
      margin-top: 2rem;
      border-top: 3px solid #1e3a5f;
      padding-top: 1rem;
      text-align: center;
      font-weight: 700;
      color: #0b2a4a;
      font-size: 0.9rem;
    }
    .empty {
      grid-column: 1 / -1;
      background: #ffe5cc;
      border: 3px solid #1e3a5f;
      padding: 2rem;
      text-align: center;
      font-size: 1.2rem;
      font-weight: 700;
      color: #1e3a5f;
    }

    /* Mobile adjustments */
    @media (max-width: 600px) {
      body {
        padding: 0.5rem;
      }
      .container {
        padding: 1rem;
        box-shadow: 8px 8px 0 #2c4c6b;
      }
      h1 {
        font-size: 1.8rem;
        text-shadow: 2px 2px 0 #ffd966;
      }
      .logo {
        width: 50px;
        height: 50px;
      }
      .banner-content {
        gap: 0.5rem;
      }
      .banner-icon {
        width: 30px;
        height: 30px;
        font-size: 1.2rem;
      }
      .banner-text {
        font-size: 0.9rem;
      }
      .banner-link {
        font-size: 0.8rem;
        padding: 0.4rem 0.8rem;
        white-space: normal;
        width: 100%;
        text-align: center;
      }
      .discord-panel p {
        font-size: 1rem;
      }
      .discord-button {
        font-size: 1rem;
        padding: 0.5rem 1rem;
        white-space: normal;
        width: 100%;
        text-align: center;
      }
      .filter-buttons {
        justify-content: center;
      }
      .filter-btn {
        font-size: 0.9rem;
        padding: 0.4rem 1rem;
      }
      .featured-header h2,
      .games-header h2 {
        font-size: 1.5rem;
        padding: 0.3rem 1rem;
      }
      .featured-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 0.8rem;
      }
      .games-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 0.8rem;
      }
      .game-title {
        font-size: 0.9rem;
      }
      .tag-badge {
        font-size: 0.6rem;
        padding: 0.15rem 0.3rem;
      }
      .featured-badge {
        font-size: 0.7rem;
        padding: 0.2rem 0.4rem;
      }
      .lock-badge {
        font-size: 0.7rem;
        padding: 0.2rem 0.4rem;
      }
      .locked-card::after {
        font-size: 1rem;
        padding: 0.3rem 0.6rem;
      }
    }

    /* Small mobile */
    @media (max-width: 400px) {
      .featured-grid,
      .games-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      h1 {
        font-size: 1.5rem;
      }
      .header {
        gap: 0.5rem;
      }
      .locked-card::after {
        font-size: 0.8rem;
        transform: translate(-50%, -50%) rotate(-10deg);
      }
    }

    /* Landscape orientation */
    @media (max-height: 500px) and (orientation: landscape) {
      body {
        padding: 0.5rem;
      }
      .featured-grid,
      .games-grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo"></div>
    <h1>BRICKNOVA</h1>
  </div>

  <!-- BANNER SECTION -->
  <div id="bannerContainer" class="banner-container"></div>

  <div class="discord-panel">

  <div class="filter-section">

  <div class="games-grid" id="gamesGrid">

  </div>

  <div class="footer">
    � 2026 BRICKNOVA � BETA
  </div>
</div>

<!-- ANTI-CACHING SCRIPT LOADER -->
<script>
  const timestamp = new Date().getTime();
  
  function loadScript(src) {
    return new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = src + '?v=' + timestamp;
      script.onload = resolve;
      script.onerror = reject;
      document.head.appendChild(script);
    });
  }
  
  (async function() {
    try {
      await loadScript('banner.js');
      console.log('%u2705 banner.js loaded');
      
      await loadScript('lockdown.js');

      await loadScript('games.js');
      console.log('%u2705 games.js loaded');
      
      await loadScript('return-button.js');
      console.log('%u2705 return-button.js loaded');
      
      await loadScript('game-lock.js');
      console.log('%u2705 game-lock.js loaded');
      
      renderBanner();
      
      setTimeout(function() {
        
  })();
</script>
