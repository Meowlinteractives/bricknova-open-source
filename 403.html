      border: 3px solid #ffb347;
      font-weight: 900;
      font-size: 1.1rem;
      padding: 0.8rem 1.5rem;
      text-decoration: none;
      text-transform: uppercase;
      box-shadow: 4px 4px 0 #2c4c6b;
      cursor: pointer;
      transition: all 0.1s ease;
      display: inline-block;
    }
    .bricknova-button:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0 #1e3a5f;
    }
    .bricknova-button:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #2c4c6b;
    }
    .warning-text {
      font-size: 0.9rem;
      color: #1e3a5f;
      margin-top: 2rem;
      padding: 1rem;
      border-top: 2px solid #1e3a5f;

    }
    .glitch-text {
      font-size: 1rem;
      color: #0b2a4a;
      background: #ffd966;
      padding: 0.5rem;
      border: 2px solid #1e3a5f;

      margin: 1rem 0;

    .domain-warning {
